<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WV Bench 07 – Smooth Animations</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',sans-serif;background:#0a0e27;color:#fff;padding:20px}
  .container{max-width:900px;margin:0 auto}
  h1{margin-bottom:20px;text-align:center;background:linear-gradient(135deg,#00f2fe,#4facfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:32px}
  .animation-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-bottom:40px}
  .anim-box{width:100%;aspect-ratio:1;background:linear-gradient(45deg,#667eea,#764ba2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;box-shadow:0 8px 32px rgba(102,126,234,.3)}
  .anim-box.pulse{animation:pulse 2s ease-in-out infinite}
  .anim-box.bounce{animation:bounce 1.5s ease-in-out infinite}
  .anim-box.rotate{animation:rotate 3s linear infinite}
  .anim-box.scale{animation:scale 2s ease-in-out infinite}
  .anim-box.slide{animation:slide 2.5s ease-in-out infinite}
  .anim-box.color{animation:colorShift 4s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.8}}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
  @keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  @keyframes scale{0%,100%{transform:scale(1)}50%{transform:scale(.85)}}
  @keyframes slide{0%,100%{transform:translateX(-10px)}50%{transform:translateX(10px)}}
  @keyframes colorShift{0%{background:linear-gradient(45deg,#667eea,#764ba2)}50%{background:linear-gradient(45deg,#f093fb,#f5576c)}100%{background:linear-gradient(45deg,#667eea,#764ba2)}}
  .controls{display:flex;gap:10px;justify-content:center;margin-bottom:40px;flex-wrap:wrap}
  .btn{padding:12px 24px;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .3s}
  .btn:hover{background:#764ba2;transform:translateY(-2px);box-shadow:0 8px 16px rgba(102,126,234,.4)}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-top:30px;background:rgba(255,255,255,.05);padding:20px;border-radius:12px}
  .metric{padding:15px;background:rgba(102,126,234,.1);border-left:3px solid #667eea;border-radius:6px}
  .metric-label{font-size:13px;opacity:.8;margin-bottom:8px}
  .metric-value{font-size:24px;font-weight:700;color:#00f2fe}
  pre{background:rgba(0,0,0,.3);padding:15px;border-radius:8px;overflow-x:auto;font-size:12px}
</style>
</head>
<body>
<div class="container">
  <h1>Animation Performance Benchmark</h1>
  <div class="controls">
    <button class="btn" onclick="startBenchmark()">Start Benchmark</button>
    <button class="btn" onclick="pauseAnimations()">Pause</button>
    <button class="btn" onclick="resumeAnimations()">Resume</button>
  </div>
  <div class="animation-grid" id="grid">
    <div class="anim-box pulse">Pulse</div>
    <div class="anim-box bounce">Bounce</div>
    <div class="anim-box rotate">Rotate</div>
    <div class="anim-box scale">Scale</div>
    <div class="anim-box slide">Slide</div>
    <div class="anim-box color">Color</div>
    <div class="anim-box pulse">Pulse 2</div>
    <div class="anim-box bounce">Bounce 2</div>
    <div class="anim-box rotate">Rotate 2</div>
    <div class="anim-box scale">Scale 2</div>
    <div class="anim-box slide">Slide 2</div>
    <div class="anim-box color">Color 2</div>
  </div>
  <div class="metrics" id="metrics">
    <div class="metric"><div class="metric-label">Animation FPS</div><div class="metric-value" id="fps">—</div></div>
    <div class="metric"><div class="metric-label">Frame Time</div><div class="metric-value" id="frameTime">—</div></div>
    <div class="metric"><div class="metric-label">JS Time</div><div class="metric-value" id="jsTime">—</div></div>
    <div class="metric"><div class="metric-label">CSS Transition Count</div><div class="metric-value" id="transCount">12</div></div>
  </div>
  <pre id="results">RUNNING BENCHMARK...</pre>
</div>

<script>
'use strict';
let animationRunning = true;
let frameCount = 0;
let lastTime = performance.now();
let measurements = [];

function measureAnimationPerf() {
  const results = {scenario:'WV07_SmoothAnimations', timestamp:new Date().toISOString()};
  
  // Measure CSS animation frame rate via requestAnimationFrame
  let rafFrames = 0;
  let rafStart = performance.now();
  let rafTimes = [];
  
  return new Promise(resolve => {
    function rafLoop() {
      const now = performance.now();
      rafTimes.push(now - rafStart);
      rafFrames++;
      
      if(now - rafStart < 5000) {
        requestAnimationFrame(rafLoop);
      } else {
        // Calculate FPS from frame intervals
        const intervals = [];
        for(let i=1; i<rafTimes.length; i++) {
          intervals.push(rafTimes[i] - rafTimes[i-1]);
        }
        intervals.sort((a,b)=>a-b);
        
        results.raf_frame_count = rafFrames;
        results.raf_duration_ms = +(rafTimes[rafTimes.length-1]).toFixed(2);
        results.raf_avg_frame_interval_ms = +(intervals.reduce((a,b)=>a+b,0)/intervals.length).toFixed(3);
        results.raf_fps_avg = +(1000/results.raf_avg_frame_interval_ms).toFixed(1);
        results.raf_p90_frame_interval_ms = +intervals[Math.floor(intervals.length*0.9)].toFixed(3);
        results.raf_p99_frame_interval_ms = +intervals[Math.floor(intervals.length*0.99)].toFixed(3);
        results.raf_max_frame_interval_ms = +intervals[intervals.length-1].toFixed(3);
        results.raf_jank_pct = +((intervals.filter(i=>i>33.33).length/intervals.length)*100).toFixed(2);
        
        // Transition events timing
        const cards = document.querySelectorAll('.anim-box');
        results.animation_element_count = cards.length;
        
        // Memory
        if(performance.memory) {
          results.heap_used_mb = +(performance.memory.usedJSHeapSize/1048576).toFixed(2);
        }
        
        document.getElementById('fps').textContent = results.raf_fps_avg.toString();
        document.getElementById('frameTime').textContent = results.raf_avg_frame_interval_ms.toFixed(2) + 'ms';
        document.getElementById('jsTime').textContent = '< 1ms';
        
        document.getElementById('results').textContent = JSON.stringify(results,null,2);
        resolve(results);
      }
    }
    requestAnimationFrame(rafLoop);
  });
}

function startBenchmark() {
  measureAnimationPerf();
}

function pauseAnimations() {
  document.getElementById('grid').style.animationPlayState = 'paused';
  document.querySelectorAll('.anim-box').forEach(el => {
    el.style.animationPlayState = 'paused';
  });
}

function resumeAnimations() {
  document.getElementById('grid').style.animationPlayState = 'running';
  document.querySelectorAll('.anim-box').forEach(el => {
    el.style.animationPlayState = 'running';
  });
}

// Auto-start benchmark on load
window.addEventListener('load', () => {
  setTimeout(startBenchmark, 500);
});
</script>
</body>
</html>
