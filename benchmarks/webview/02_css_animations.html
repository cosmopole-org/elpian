<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WV Bench 02 – Animation Throughput</title>
<style>
  * { box-sizing: border-box; }
  body { background: #1A1A2E; font-family: monospace; padding: 8px; }
  .bar { height: 40px; border-radius: 8px; display: flex; align-items: center;
         padding: 0 12px; color: white; font-size: 12px; margin-bottom: 4px; }
</style>
</head>
<body>
<div id="stage"></div>
<pre id="results">RUNNING</pre>
<script>
'use strict';

const COLORS = ['#E91E63','#9C27B0','#3F51B5','#2196F3','#00BCD4','#4CAF50','#FF9800','#F44336','#795548','#607D8B'];

// Build 10 bars
const stage = document.getElementById('stage');
const bars = [];
for (let i = 0; i < 10; i++) {
  const bar = document.createElement('div');
  bar.className = 'bar';
  bar.style.backgroundColor = COLORS[i];
  bar.style.width = '200px';
  bar.textContent = 'Animated item ' + (i+1);
  stage.appendChild(bar);
  bars.push(bar);
}

// ── SYNCHRONOUS: simulate N animation frames and measure throughput ──────────
(function run() {
  const results = { scenario: 'WV02_CSSAnimations' };

  // 1. JS-driven width animation — simulate 300 "frames" synchronously
  const ANIM_N = 300;
  const frameTimes = [];
  for (let f = 0; f < ANIM_N; f++) {
    const t0 = performance.now();
    for (let i = 0; i < bars.length; i++) {
      const w = 200 + Math.sin(f * 0.08 + i) * 80;
      bars[i].style.width = w + 'px';
    }
    void bars[0].offsetWidth; // force layout
    const t1 = performance.now();
    frameTimes.push(t1 - t0);
  }
  frameTimes.sort((a,b) => a-b);
  const avg = frameTimes.reduce((a,b)=>a+b,0) / frameTimes.length;
  results.anim_frame_avg_ms     = +avg.toFixed(4);
  results.anim_frame_p50_ms     = +frameTimes[Math.round(frameTimes.length*.50)].toFixed(4);
  results.anim_frame_p90_ms     = +frameTimes[Math.round(frameTimes.length*.90)].toFixed(4);
  results.anim_frame_p99_ms     = +frameTimes[Math.round(frameTimes.length*.99)].toFixed(4);
  results.anim_frames_measured  = ANIM_N;
  // "theoretical FPS" = how many frames we could drive at this speed
  results.fps                   = +(1000 / avg).toFixed(1);
  results.jank_rate_pct         = +(frameTimes.filter(d=>d>16.67).length / frameTimes.length * 100).toFixed(1);

  // 2. CSS class toggle throughput (simulates animation state changes)
  const BOX_N = 500;
  const toggleTimes = [];
  const div = document.createElement('div');
  div.style.cssText = 'width:100px;height:100px;background:red;transition:all 200ms';
  document.body.appendChild(div);
  for (let i = 0; i < BOX_N; i++) {
    const t0 = performance.now();
    div.style.backgroundColor = COLORS[i % COLORS.length];
    div.style.transform = `rotate(${i}deg) scale(${0.8 + (i%5)*0.08})`;
    void div.offsetHeight;
    const t1 = performance.now();
    toggleTimes.push(t1-t0);
  }
  document.body.removeChild(div);
  toggleTimes.sort((a,b)=>a-b);
  results.style_anim_avg_ms         = +(toggleTimes.reduce((a,b)=>a+b,0)/toggleTimes.length).toFixed(4);
  results.style_anim_throughput_fps  = +(1000/results.style_anim_avg_ms).toFixed(1);

  // 3. Multi-element parallel updates (10 elements × N frames)
  const MULTI_N = 100;
  const multiTimes = [];
  for (let f = 0; f < MULTI_N; f++) {
    const t0 = performance.now();
    for (let i = 0; i < bars.length; i++) {
      bars[i].style.transform = `translateX(${Math.sin(f*0.1+i)*30}px)`;
      bars[i].style.opacity   = (0.6 + Math.cos(f*0.1+i)*0.4).toFixed(3);
    }
    void document.body.offsetHeight;
    const t1 = performance.now();
    multiTimes.push(t1-t0);
  }
  multiTimes.sort((a,b)=>a-b);
  results.multi_elem_avg_ms = +(multiTimes.reduce((a,b)=>a+b,0)/multiTimes.length).toFixed(4);
  results.multi_elem_fps    = +(1000/results.multi_elem_avg_ms).toFixed(1);
  results.animated_elements = bars.length;

  // 4. Memory
  if (performance.memory) {
    results.heap_used_mb = +(performance.memory.usedJSHeapSize/1048576).toFixed(2);
  }
  results.timestamp = new Date().toISOString();
  document.getElementById('results').textContent = JSON.stringify(results, null, 2);
})();
</script>
</body>
</html>
