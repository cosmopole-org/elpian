name: Elpian Windows Benchmark

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'rust/src/**'
      - 'example/integration_test/**'
      - 'example/test_driver/**'
      - 'rust_builder/windows/CMakeLists.txt'
      - '.github/workflows/windows_benchmark.yml'

jobs:
  build-and-benchmark:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Developer Mode (symlink support for Flutter)
        shell: cmd
        run: |
          reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /v "AllowDevelopmentWithoutDevLicense" /t REG_DWORD /d 1 /f

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          cache: true

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: rust/target
          key: ${{ runner.os }}-rust-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Pub\Cache
            example\.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('example/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter pub get (example)
        working-directory: example
        run: flutter pub get

      - name: Pre-build Rust DLL
        working-directory: rust
        run: cargo build --release

      - name: Create benchmark output directory
        shell: powershell
        run: New-Item -ItemType Directory -Force "example\benchmarks\reports"

      - name: Run integration benchmark (flutter drive --profile)
        working-directory: example
        shell: powershell
        run: |
          flutter drive `
            --target=integration_test/elpian_benchmark_test.dart `
            --driver=test_driver/integration_test_driver.dart `
            -d windows `
            --profile `
            --no-pub
        timeout-minutes: 30

      - name: Show results
        if: always()
        shell: powershell
        run: |
          $f = "example\benchmarks\reports\elpian_raw_results.json"
          if (Test-Path $f) { Get-Content $f } else { Write-Host "No results file found" }

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: elpian-benchmark-results-${{ github.sha }}
          path: example/benchmarks/reports/elpian_raw_results.json
          if-no-files-found: warn
          retention-days: 90

      - name: Also build release app and upload
        working-directory: example
        shell: powershell
        run: flutter build windows --release --no-pub

      - name: Zip release build
        shell: powershell
        run: |
          $src = "example\build\windows\x64\runner\Release"
          Compress-Archive -Path "$src\*" -DestinationPath "elpian_windows_release.zip" -Force
          Write-Host "Zipped: $((Get-Item elpian_windows_release.zip).Length / 1MB) MB"

      - name: Upload Windows release app
        uses: actions/upload-artifact@v4
        with:
          name: elpian-windows-release-${{ github.sha }}
          path: elpian_windows_release.zip
          retention-days: 90
