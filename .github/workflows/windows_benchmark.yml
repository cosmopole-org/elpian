name: Elpian Windows - Build Integration Test Binary

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-profile-test-binary:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Developer Mode
        shell: cmd
        run: |
          reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /v "AllowDevelopmentWithoutDevLicense" /t REG_DWORD /d 1 /f

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          cache: true

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: rust/target
          key: ${{ runner.os }}-rust-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-rust-

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Pub\Cache
            example\.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('example/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter pub get (example)
        working-directory: example
        run: flutter pub get

      - name: Pre-build Rust DLL
        working-directory: rust
        run: cargo build --release

      # Build the app with the integration test as entry point, in profile mode.
      # Profile = observatory enabled (driver can connect) + real optimizations.
      # NO benchmark is run here - just a build.
      - name: Build integration test binary (profile)
        working-directory: example
        shell: powershell
        run: |
          flutter build windows `
            --profile `
            --target=integration_test/elpian_benchmark_test.dart `
            --no-pub

      - name: Zip profile build output
        shell: powershell
        run: |
          $src = "example\build\windows\x64\runner\Profile"
          $dst = "elpian_benchmark_profile.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dst -Force
          $sizeMB = [math]::Round((Get-Item $dst).Length / 1MB, 1)
          Write-Host "Built: $dst ($sizeMB MB)"
          Write-Host "Contents:"
          Get-ChildItem $src | Select-Object Name,Length

      - name: Upload profile binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: elpian-benchmark-profile-${{ github.sha }}
          path: elpian_benchmark_profile.zip
          retention-days: 90
