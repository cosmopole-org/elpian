name: Elpian Windows Benchmark

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'rust/src/**'
      - 'example/integration_test/**'
      - 'example/test_driver/**'
      - 'rust_builder/windows/CMakeLists.txt'
      - '.github/workflows/windows_benchmark.yml'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Developer Mode (symlink support for Flutter)
        shell: cmd
        run: |
          reg add "HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /v "AllowDevelopmentWithoutDevLicense" /t REG_DWORD /d 1 /f

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          cache: true

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: rust/target
          key: ${{ runner.os }}-rust-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Pub\Cache
            example\.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('example/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Flutter pub get (root package)
        run: flutter pub get

      - name: Flutter pub get (example app)
        working-directory: example
        run: flutter pub get

      - name: Pre-build Rust DLL
        working-directory: rust
        run: cargo build --release

      - name: Build Flutter Windows app (release)
        working-directory: example
        run: flutter build windows --release --no-pub

      - name: Zip Windows build output
        shell: powershell
        run: |
          $src = "example\build\windows\x64\runner\Release"
          $dst = "elpian_windows_release.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dst -Force
          Write-Host "Zipped $src -> $dst ($('{0:N1}' -f ((Get-Item $dst).Length / 1MB)) MB)"

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v4
        with:
          name: elpian-windows-release-${{ github.sha }}
          path: elpian_windows_release.zip
          retention-days: 90
